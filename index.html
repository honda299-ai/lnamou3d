<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دفتر ذكرياتنا</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== واجهة الترحيب ===== -->
  <div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-card">
      <div class="welcome-emoji">💛</div>
      <h2>أهلاً بيكي في دفتر ذكرياتنا</h2>
      <p>قولي لنا إنتي مين عشان نكتب الذكريات باسمك</p>
      <div class="welcome-buttons">
        <button class="welcome-btn reem" onclick="chooseAuthor('ريم')">👩 ريم</button>
        <button class="welcome-btn mohand" onclick="chooseAuthor('مهند')">👨 مهند</button>
      </div>
    </div>
  </div>

  <!-- ===== التطبيق الرئيسي ===== -->
  <div class="book">
    <div class="header">
      <h1>📖 دفتر ذكرياتنا 💛</h1>
      <p id="greeting">كل ذكرى حلوة بينا ليها مكان هنا</p>
    </div>

    <div class="content">
      <!-- قسم الإضافة -->
      <div class="form-section">
        <div class="section-title">✍️ اكتبي ذكرى جديدة</div>

        <label for="title">📌 عنوان الذكرى</label>
        <input type="text" id="title" placeholder="مثلاً: اول يوم عرفنا بعض" />

        <label for="date">📅 التاريخ</label>
        <input type="date" id="date" />

        <label for="text">💭 تفاصيل الذكرى</label>
        <textarea id="text" placeholder="اكتبي هنا كل التفاصيل الحلوة..."></textarea>

        <div class="draft-note">✨ الذكريات تظهر لكل المستخدمين فوراً</div>

        <div class="buttons">
          <button class="save-btn" id="saveBtn">💾 حفظ الذكرى</button>
          <button class="clear-btn" onclick="clearFields()">🗑️ مسح الكتابة</button>
        </div>

        <div id="loadingStatus" style="margin-top:10px;font-size:14px;color:#8c6a42;"></div>
      </div>

      <!-- قسم العرض -->
      <div class="memories-section">
        <div class="section-title">
          📚 ذكرياتنا
          <span class="count" id="memoriesCount">0</span>
        </div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث في الذكريات..." oninput="renderMemories()" />
        <div id="memoriesList"></div>
      </div>
    </div>
  </div>

  <!-- ===== Firebase SDK (compat) ===== -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- ===== التطبيق ===== -->
  <script src="main.js"></script>
</body>
</html>
